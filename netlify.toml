# HYDRATEST — Netlify Configuration

[build]
  publish = "."

# Serve index.html for all routes (handles /results/ without a server)
[[redirects]]
  from   = "/results"
  to     = "/results/index.html"
  status = 200

[[redirects]]
  from   = "/results/"
  to     = "/results/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Cache fonts and static assets
[[headers]]
  for = "/src/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
